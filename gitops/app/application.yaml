apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lab-gitops-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/MaksymZolotarchuk/docker-data-pipeline.git'
    targetRevision: HEAD
    path: gitops/app
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: lab-namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
